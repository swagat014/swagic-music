name: Build and Release Swagic Music APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Create or Update Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Swagic Music Build"
          body: |
            This is the latest automated build of Swagic Music.
            
            **Scan the QR code below to download it directly on your phone:**
            
            ![Download QR Code](https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://github.com/${{ github.repository }}/releases/latest/download/app-debug.apk)
            
            *Direct Link: [app-debug.apk](https://github.com/${{ github.repository }}/releases/latest/download/app-debug.apk)*
          draft: false
          prerelease: true
          files: |
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
