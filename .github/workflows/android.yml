name: Build and Release Swagic Music APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee build_log.txt

      - name: Commit and Push Build Logs on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build_log.txt
          git commit -m "chore: add build logs for failed run [skip ci]"
          git push origin main

      - name: Create or Update Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Swagic Music Build"
          body: |
            **Scan the QR code below to download the ARM64 APK directly on your phone:**
            
            ![Download QR Code](https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://github.com/${{ github.repository }}/releases/latest/download/app-arm64-v8a-debug.apk)
            
            *Direct Link: [app-arm64-v8a-debug.apk](https://github.com/${{ github.repository }}/releases/latest/download/app-arm64-v8a-debug.apk)*
          draft: false
          prerelease: true
          files: |
            app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
